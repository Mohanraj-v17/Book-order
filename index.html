<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <h1 class="display-4 my-5">Book Way</h1>
                <button class="btn btn-dark" id="clear">Clear all</button>
                
            </div>

            <div class="show-alert"></div>
            
            <form id="book-form" class="mb-4">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="title" placeholder="">
                    <label for="title">title</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="author" placeholder="" >
                    <label for="author">author</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="number" class="form-control" id="isbn" placeholder="" >
                    <label for="isbn">isbn</label>
                </div>

                <button type="submit" class="btn btn-dark">add</button>
            </form>

            <table class="table table-hover">

                <t-head>
                    <tr>
                        <th>Title</th>
                        <th>Author</th>
                        <th>ISBN</th>
                        <th></th>
                    </tr>
                </t-head>

                <tbody id="book-list">
                    <tr>
                        <td>web dev</td>
                        <td>Mohan</td>
                        <td>123</td>
                        <td class="delete">
                            <span class="btn btn-danger">X</span>
                        </td>
                        
                    </tr>
                </tbody>

            </table>

        </div>

</body>
<script src="./es6.js"></script>

</html>
